<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>財政部高雄國稅局 · 新聞稿AI生成系統</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --surface-2: #f0ede6;
    --border: #d8d0c4;
    --border-focus: #8b6914;
    --accent: #8b6914;
    --accent-dark: #5c4509;
    --accent-light: #f5e9cc;
    --text: #1a1612;
    --text-muted: #6b5e4e;
    --text-faint: #a0937f;
    --success: #2d6a4f;
    --error: #9b2226;
    --tag-bg: #e8e0d0;
    --shadow: 0 2px 12px rgba(100,80,40,0.10);
    --shadow-lg: 0 8px 32px rgba(100,80,40,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--accent-dark);
    color: #fff;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header-logo { display: flex; align-items: center; gap: 12px; }
  .header-logo .badge { background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: 1px; }
  .header-title { font-family: 'Noto Serif TC', serif; font-size: 16px; font-weight: 700; letter-spacing: 1px; }
  
  .main { display: grid; grid-template-columns: 420px 1fr; gap: 0; flex: 1; height: calc(100vh - 56px); overflow: hidden; }

  .left-panel { background: var(--surface); border-right: 1.5px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .panel-header { padding: 18px 24px 14px; border-bottom: 1px solid var(--border); background: var(--surface-2); }
  .panel-header h2 { font-family: 'Noto Serif TC', serif; font-size: 14px; font-weight: 700; color: var(--accent-dark); display: flex; align-items: center; gap: 8px; }
  
  .left-scroll { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 12px; font-weight: 700; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  
  select, textarea, input[type=text] { font-family: 'Noto Sans TC', sans-serif; font-size: 13px; border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 12px; outline: none; width: 100%; }
  textarea { resize: vertical; line-height: 1.6; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 5px 12px; border-radius: 99px; border: 1.5px solid var(--border); font-size: 11px; cursor: pointer; background: var(--bg); transition: 0.2s; }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .btn-generate { width: 100%; background: var(--accent-dark); color: #fff; border: none; border-radius: 10px; padding: 14px; font-family: 'Noto Serif TC', serif; font-weight: 700; cursor: pointer; transition: 0.2s; }
  .btn-generate:hover { background: var(--accent); }

  .right-panel { display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
  .title-section { background: var(--surface); border-bottom: 1.5px solid var(--border); padding: 20px 32px; min-height: 140px; }
  .content-section { flex: 1; display: flex; flex-direction: column; padding: 20px 32px; gap: 14px; overflow: hidden; }
  .content-area-wrapper { flex: 1; background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
  .content-display { flex: 1; overflow-y: auto; padding: 20px; font-size: 14px; line-height: 1.9; white-space: pre-wrap; }

  .chat-section { padding: 14px 32px; border-top: 1.5px solid var(--border); background: var(--surface); }
  .chat-input-row { display: flex; gap: 8px; margin-top: 10px; }
  .chat-input { flex: 1; border: 1.5px solid var(--border); border-radius: 8px; padding: 10px; resize: none; }
  
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--accent-dark); color: #fff; padding: 12px 20px; border-radius: 10px; opacity: 0; transition: 0.3s; z-index: 1000; }
  .toast.show { opacity: 1; }

  /* Loading Overlay */
  .loading-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.8); display: none; align-items: center; justify-content: center; z-index: 10; }
  .loading-overlay.show { display: flex; }
</style>
</head>
<body>

<header>
  <div class="header-logo">
    <span class="badge">GOV</span>
    <span class="header-title">財政部高雄國稅局 · 新聞稿AI生成系統</span>
  </div>
</header>

<div class="main">
  <div class="left-panel">
    <div class="panel-header">
      <h2>📝 新聞稿輸入區</h2>
    </div>
    <div class="left-scroll">
      <div class="field-group">
        <label class="field-label">👤 登入狀態</label>
        <div id="keyStatus" style="font-size:12px;padding:10px;background:var(--bg);border-radius:8px;border:1.5px solid var(--border);">載入中...</div>
      </div>
      <div class="field-group">
        <label class="field-label">📋 主題與主要內容</label>
        <textarea id="mainContent" rows="6" placeholder="請輸入新聞稿核心內容..."></textarea>
      </div>
      <div class="field-group">
        <label class="field-label">🎨 語氣風格</label>
        <div class="chips">
          <button class="chip active" onclick="setTone(this, '正式嚴謹')">正式嚴謹</button>
          <button class="chip" onclick="setTone(this, '親民易懂')">親民易懂</button>
          <button class="chip" onclick="setTone(this, '警示提醒')">警示提醒</button>
        </div>
      </div>
      <button class="btn-generate" id="generateBtn" onclick="generatePressRelease()">✦ 產出新聞稿</button>
    </div>
  </div>

  <div class="right-panel">
    <div class="title-section">
      <div id="titleArea" style="font-size:13px; color:var(--text-faint);">等待生成標題...</div>
    </div>
    <div class="content-section">
      <div class="content-area-wrapper">
        <div class="loading-overlay" id="loadingOverlay">AI 正在生成中...</div>
        <div id="contentDisplay" class="content-display"></div>
      </div>
    </div>
    <div class="chat-section">
      <div class="chat-input-row">
        <textarea id="chatInput" class="chat-input" placeholder="輸入修改建議..." rows="2"></textarea>
        <button onclick="sendRevision()" style="background:var(--accent); color:#fff; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">發送</button>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ====== 1. 核心配置 ======
const SITE_CONFIG = {
  // 請在此填入您的正式 Client ID
  googleClientId: '240170147041-nbf6pe6p59s93e0chsfp11kuenvku57q.apps.googleusercontent.com'
};

let currentUser = null;
let accessToken = null;
let tokenClient;
let selectedTone = '正式嚴謹';

// ====== 2. 初始化 Google SDK ======
window.addEventListener('DOMContentLoaded', () => {
  const script = document.createElement('script');
  script.src = 'https://accounts.google.com/gsi/client';
  script.onload = () => {
    google.accounts.id.initialize({
      client_id: SITE_CONFIG.googleClientId,
      callback: handleGoogleIdToken,
    });

    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: SITE_CONFIG.googleClientId,
      scope: 'https://www.googleapis.com/auth/generative-language',
      callback: (resp) => {
        if (resp.error) return showToast('❌ 授權失敗');
        accessToken = resp.access_token;
        sessionStorage.setItem('ntbk_access_token', accessToken);
        enterApp();
      },
    });
    checkAuth();
  };
  document.head.appendChild(script);
});

function checkAuth() {
  const savedUser = sessionStorage.getItem('ntbk_user');
  const savedToken = sessionStorage.getItem('ntbk_access_token');
  if (savedUser && savedToken) {
    currentUser = JSON.parse(savedUser);
    accessToken = savedToken;
    enterApp();
  } else {
    renderLoginScreen();
  }
}

function renderLoginScreen() {
  document.querySelector('.main').style.display = 'none';
  const loginOverlay = document.createElement('div');
  loginOverlay.id = 'loginScreen';
  loginOverlay.style.cssText = 'position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:500;';
  loginOverlay.innerHTML = `
    <div style="background:#fff;border-radius:20px;padding:48px;width:400px;text-align:center;box-shadow:var(--shadow-lg);">
      <h2 style="margin-bottom:20px;">歡迎使用生成系統</h2>
      <div id="gBtn" style="display:flex;justify-content:center;"></div>
    </div>
  `;
  document.body.appendChild(loginOverlay);
  google.accounts.id.renderButton(document.getElementById('gBtn'), { theme: 'outline', size: 'large' });
}

function handleGoogleIdToken(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  currentUser = { name: payload.name, email: payload.email, picture: payload.picture };
  sessionStorage.setItem('ntbk_user', JSON.stringify(currentUser));
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function enterApp() {
  if(document.getElementById('loginScreen')) document.getElementById('loginScreen').remove();
  document.querySelector('.main').style.display = 'grid';
  document.getElementById('keyStatus').innerHTML = `✅ 已登入: ${currentUser.email} <button onclick="signOut()" style="margin-left:10px; cursor:pointer;">登出</button>`;
}

function signOut() { sessionStorage.clear(); location.reload(); }

// ====== 3. 生成邏輯 ======
async function generatePressRelease() {
  const content = document.getElementById('mainContent').value;
  if(!content) return showToast('請輸入內容');
  
  toggleLoading(true);
  const systemPrompt = `你是一位專業的新聞稿撰寫員。請根據以下內容生成新聞稿。
  格式：
  [TITLE_1] 標題1
  [CONTENT_START] 正文 [CONTENT_END]`;
  
  try {
    const result = await callGemini(systemPrompt, content);
    displayResult(result);
  } catch(e) { showToast(e.message); }
  toggleLoading(false);
}

async function callGemini(sys, user) {
  const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent';
  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}` },
    body: JSON.stringify({
      system_instruction: { parts: [{ text: sys }] },
      contents: [{ role: 'user', parts: [{ text: user }] }]
    })
  });
  if(!resp.ok) throw new Error('API 錯誤');
  const data = await resp.json();
  return data.candidates[0].content.parts[0].text;
}

function displayResult(raw) {
  const contentMatch = raw.match(/\[CONTENT_START\]([\s\S]*?)\[CONTENT_END\]/);
  document.getElementById('contentDisplay').textContent = contentMatch ? contentMatch[1].trim() : raw;
  document.getElementById('titleArea').textContent = "生成完成，請檢查內容。";
}

function setTone(btn, val) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  selectedTone = val;
}

function toggleLoading(show) { document.getElementById('loadingOverlay').classList.toggle('show', show); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
