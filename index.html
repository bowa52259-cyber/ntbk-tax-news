<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高雄國稅局 · 新聞稿AI生成</title>
<style>
  body { font-family: sans-serif; background: #f5f3ee; display: flex; flex-direction: column; height: 100vh; margin: 0; }
  header { background: #5c4509; color: white; padding: 15px 30px; font-weight: bold; }
  .login-overlay { position: fixed; inset: 0; background: #f5f3ee; display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .login-card { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 380px;}
  .main-content { display: grid; grid-template-columns: 350px 1fr; flex: 1; padding: 20px; gap: 20px; }
  textarea { width: 100%; height: 350px; padding: 15px; border-radius: 10px; border: 1.5px solid #d8d0c4; font-size: 14px; box-sizing: border-box; }
  button { background: #8b6914; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
  #result { background: white; padding: 25px; border-radius: 10px; border: 1.5px solid #d8d0c4; white-space: pre-wrap; overflow-y: auto; line-height: 1.8; min-height: 350px; }
</style>
</head>
<body>

<header>財政部高雄國稅局 · 新聞稿AI生成系統</header>

<div id="loginOverlay" class="login-overlay">
  <div class="login-card">
    <div style="font-size: 48px; margin-bottom: 15px;">🚀</div>
    <h2 style="margin-bottom: 10px;">系統準備就緒</h2>
    <p style="font-size: 14px; color: #666; margin-bottom: 25px;">請登入並在授權視窗中「勾選」權限</p>
    <div id="gBtn" style="display:flex; justify-content:center; margin-bottom: 20px;"></div>
    <button onclick="manualAuth()" style="background: #4285f4; font-size: 13px;">若未跳轉，請點此手動授權</button>
  </div>
</div>

<div class="main-content">
  <div>
    <textarea id="userInput" placeholder="請在此輸入內容..."></textarea>
    <button onclick="generate()">✦ 開始生成新聞稿</button>
  </div>
  <div id="result">新聞稿內容將在此顯示...</div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  const CLIENT_ID = '240170147041-nbf6pe6p59s93e0chsfp11kuenvku57q.apps.googleusercontent.com';
  let accessToken = null;
  let tokenClient;

  window.onload = () => {
    google.accounts.id.initialize({
      client_id: CLIENT_ID,
      callback: () => { manualAuth(); }
    });

    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/generative-language',
      callback: (tokenResp) => {
        if (tokenResp.error) {
          alert("授權出錯：" + tokenResp.error + "\n請確認後台 Scopes 設定。");
          return;
        }
        accessToken = tokenResp.access_token;
        document.getElementById('loginOverlay').style.display = 'none';
      },
    });

    google.accounts.id.renderButton(document.getElementById('gBtn'), { theme: 'outline', size: 'large', width: 280 });
  };

  function manualAuth() { tokenClient.requestAccessToken({ prompt: 'consent' }); }

  async function generate() {
    if (!accessToken) return alert("尚未授權");
    const text = document.getElementById('userInput').value;
    const resDiv = document.getElementById('result');
    if (!text) return alert("請輸入內容");

    resDiv.innerText = "⏳ 正在生成...";

    try {
      const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}` },
        body: JSON.stringify({
          contents: [{ role: 'user', parts: [{ text: "撰寫一份國稅局正式新聞稿：\n" + text }] }]
        })
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error.message);
      resDiv.innerText = data.candidates[0].content.parts[0].text;
    } catch (e) {
      resDiv.innerText = "❌ 失敗：" + e.message;
    }
  }
</script>
</body>
</html>
